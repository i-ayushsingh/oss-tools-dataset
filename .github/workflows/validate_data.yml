name: Validate Data Schema

on:
  pull_request:
    paths:
      - "data/**"
  push:
    branches: [main]
    paths:
      - "data/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate CSV schema
        run: python scripts/validate_schema.py --file data/tools.csv

      - name: Validate JSON
        run: python -c "import json; data=json.load(open('data/tools.json')); print(f'✅ JSON valid — {len(data)} records')"

      - name: Check for duplicate IDs
        run: |
          python -c "
          import json
          data = json.load(open('data/tools.json'))
          ids = [d['id'] for d in data]
          dupes = [i for i in ids if ids.count(i) > 1]
          if dupes:
              print(f'❌ Duplicate IDs found: {set(dupes)}')
              exit(1)
          print(f'✅ No duplicate IDs across {len(ids)} records')
          "

      - name: Check for duplicate GitHub URLs
        run: |
          python -c "
          import json
          data = json.load(open('data/tools.json'))
          urls = [d.get('github_url','').strip().rstrip('/') for d in data if d.get('github_url')]
          dupes = {u for u in urls if urls.count(u) > 1}
          if dupes:
              print(f'⚠️  Duplicate GitHub URLs: {dupes}')
          else:
              print(f'✅ No duplicate GitHub URLs')
          "
