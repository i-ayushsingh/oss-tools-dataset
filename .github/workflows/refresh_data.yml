name: Refresh GitHub Metadata

on:
  schedule:
    # Runs every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:   # also allows manual trigger from the Actions tab

permissions:
  contents: write      # needed to commit the refreshed data back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Refresh GitHub metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python scripts/refresh_github_meta.py

      - name: Validate updated data
        run: python scripts/validate_schema.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tools.csv data/tools.json data/tools.sql
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: refresh GitHub metadata $(date -u +%Y-%m-%d)"
          git push
